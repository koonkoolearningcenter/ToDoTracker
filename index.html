<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dissertation Sprint</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sand-top: #19023b;
    --sand-bot: #19023b;
    --sand-flow: #19023b;
    --bg: #1E104E;
    --bg2: #1E104E;
    --surface: #372683;
    --border: #4e527a;
    --accent: #FFC85C;
    --accent2: #FFC85C;
    --text: #f5e6c8;
    --text-dim: #6f739b;
    --green: #7ec88a;
    --red: #e07060;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.6;
  }

  header {
    text-align: center;
    padding: 28px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #09082a 0%, transparent 100%);
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-style: italic;
    color: var(--accent2);
    letter-spacing: 0.03em;
  }

  header p {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .main {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    flex: 1;
    min-height: 0;
  }

  /* ── TIMER PANEL ── */
  .timer-panel {
    border-right: 1px solid var(--border);
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    background: var(--bg2);
  }

  .timer-label {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* Sand timer SVG container */
  .hourglass-wrap {
    position: relative;
    width: 160px;
    height: 240px;
  }

  #hourglass-svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 18px rgba(201,147,74,0.3));
  }

  /* Sand particle animation */
  .sand-stream {
    animation: fall linear infinite;
  }

  @keyframes fall {
    0%   { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(90px); opacity: 0; }
  }

  @keyframes sandPulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  .time-display {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--accent2);
    letter-spacing: -0.02em;
    line-height: 1;
    text-align: center;
  }

  .time-display span {
    font-size: 1.2rem;
    color: var(--text-dim);
    display: block;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    letter-spacing: 0.1em;
  }

  /* Timer controls */
  .timer-controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .time-setter {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .time-input-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .time-input-group label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .time-input-group input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    text-align: center;
    padding: 8px 4px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }

  .time-input-group input:focus {
    border-color: var(--accent);
  }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .btn {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn:hover { background: var(--border); border-color: var(--accent); color: var(--accent2); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #1a1208; font-weight: 500; }
  .btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn.danger { border-color: #5a2a20; color: var(--red); }
  .btn.danger:hover { background: #3a1a10; border-color: var(--red); }

  .progress-bar-wrap {
    width: 100%;
  }

  .progress-bar-track {
    width: 100%;
    height: 6px;
    background: var(--surface);
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sand-bot), var(--accent2));
    border-radius: 999px;
    transition: width 1s linear;
    width: 100%;
  }

  .progress-bar-fill.low {
    background: linear-gradient(90deg, #c04030, #e06050);
    animation: urgentPulse 1s ease-in-out infinite;
  }

  @keyframes urgentPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* ── TODO PANEL ── */
  .todo-panel {
    padding: 32px 36px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  .todo-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
  }

  .todo-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-style: italic;
    color: var(--accent2);
  }

  .todo-stats {
    font-size: 0.68rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
  }

  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .todo-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .todo-item:hover { border-color: var(--accent); transform: translateX(3px); }
  .todo-item:hover::before { opacity: 1; }

  .todo-item.done {
    opacity: 0.45;
    border-color: var(--border);
  }

  .todo-item.done .todo-text {
    text-decoration: line-through;
    color: var(--text-dim);
  }

  .todo-item.done::before {
    background: var(--green);
    opacity: 1;
  }

  .todo-item.completing {
    animation: celebrate 0.5s ease;
  }

  @keyframes celebrate {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.03) translateX(4px); background: #2a3a20; border-color: var(--green); }
    100% { transform: scale(1) translateX(3px); }
  }

  .todo-check {
    width: 22px;
    height: 22px;
    border: 2px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: transparent;
  }

  .todo-item:hover .todo-check { border-color: var(--accent); }
  .todo-item.done .todo-check { background: var(--green); border-color: var(--green); }

  .todo-check svg { display: none; }
  .todo-item.done .todo-check svg { display: block; }

  .todo-text {
    flex: 1;
    font-size: 0.88rem;
    line-height: 1.4;
    letter-spacing: 0.02em;
    transition: color 0.2s;
  }

  .todo-tag {
    font-size: 0.6rem;
    padding: 3px 8px;
    border-radius: 999px;
    background: rgba(201,147,74,0.15);
    color: var(--accent);
    border: 1px solid rgba(201,147,74,0.25);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .todo-delete {
    opacity: 0;
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 1rem;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
    transition: opacity 0.2s, background 0.2s;
  }

  .todo-item:hover .todo-delete { opacity: 1; }
  .todo-delete:hover { background: rgba(224,112,96,0.15); }

  /* Add task */
  .add-task-area {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 16px 18px;
    background: var(--bg2);
    border: 1px dashed var(--border);
    border-radius: 10px;
    margin-top: 8px;
  }

  .add-task-area label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .add-task-row {
    display: flex;
    gap: 8px;
  }

  .add-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-input:focus { border-color: var(--accent); }
  .add-input::placeholder { color: var(--text-dim); }

  .add-tag-select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 10px 10px;
    border-radius: 8px;
    outline: none;
    cursor: pointer;
  }

  /* Confetti overlay */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }

  /* Alarm overlay */
  .alarm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(180, 60, 40, 0.92);
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .alarm-overlay.show { display: flex; }

  .alarm-overlay h2 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-style: italic;
    color: #fff;
    animation: shake 0.4s ease infinite;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .alarm-overlay p { color: rgba(255,255,255,0.8); font-size: 0.9rem; }

  /* Responsive */
  @media (max-width: 720px) {
    .main { grid-template-columns: 1fr; }
    .timer-panel { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="alarm-overlay" id="alarmOverlay">
  <h2>⏰ Time's Up!</h2>
  <p>Time's up!.</p>
  <button class="btn primary" onclick="dismissAlarm()" style="margin-top:12px;padding:14px 32px;font-size:0.9rem;">Dismiss</button>
</div>

<header>
  <h1>Get your ass up and work!</h1>
  <p>Stay focused · Finish strong · You've got this</p>
</header>

<div class="main">

  <!-- ── TIMER PANEL ── -->
  <div class="timer-panel">
    <div class="timer-label">Session Timer</div>

    <div class="hourglass-wrap">
      <svg id="hourglass-svg" viewBox="0 0 160 240" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6a4a1e" stop-opacity="0.7"/>
            <stop offset="50%" stop-color="#a07030" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#6a4a1e" stop-opacity="0.7"/>
          </linearGradient>
          <linearGradient id="frameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#7a5520"/>
            <stop offset="40%" stop-color="#c9934a"/>
            <stop offset="100%" stop-color="#7a5520"/>
          </linearGradient>
          <linearGradient id="sandTopGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#e8c97a"/>
            <stop offset="100%" stop-color="#c9934a"/>
          </linearGradient>
          <linearGradient id="sandBotGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#d4a843"/>
            <stop offset="100%" stop-color="#b87e2a"/>
          </linearGradient>
          <clipPath id="topBulb">
            <polygon points="20,18 140,18 96,118 64,118"/>
          </clipPath>
          <clipPath id="botBulb">
            <polygon points="64,122 96,122 140,222 20,222"/>
          </clipPath>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
        </defs>

        <!-- Top bulb glass -->
        <polygon points="20,18 140,18 96,118 64,118" fill="url(#glassGrad)" stroke="url(#frameGrad)" stroke-width="2.5"/>
        <!-- Bottom bulb glass -->
        <polygon points="64,122 96,122 140,222 20,222" fill="url(#glassGrad)" stroke="url(#frameGrad)" stroke-width="2.5"/>

        <!-- Sand in top bulb (dynamic height via JS) -->
        <g clip-path="url(#topBulb)">
          <rect id="sandTop" x="0" y="60" width="160" height="80" fill="url(#sandTopGrad)" opacity="0.9"/>
          <!-- Sand surface ripple -->
          <ellipse id="sandTopSurface" cx="80" cy="60" rx="35" ry="4" fill="#f0d890" opacity="0.6"/>
        </g>

        <!-- Falling sand stream -->
        <g id="sandStream">
          <line x1="80" y1="118" x2="80" y2="128" stroke="#f0d890" stroke-width="2" opacity="0.8">
            <animate attributeName="opacity" values="0.8;0.2;0.8" dur="0.4s" repeatCount="indefinite"/>
          </line>
          <circle cx="80" cy="121" r="1.5" fill="#e8c97a" opacity="0.9">
            <animate attributeName="cy" values="118;128" dur="0.3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0" dur="0.3s" repeatCount="indefinite"/>
          </circle>
          <circle cx="78" cy="122" r="1" fill="#f0d890" opacity="0.7">
            <animate attributeName="cy" values="119;130" dur="0.35s" begin="0.1s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.9;0" dur="0.35s" begin="0.1s" repeatCount="indefinite"/>
          </circle>
          <circle cx="82" cy="120" r="1.2" fill="#d4a843" opacity="0.8">
            <animate attributeName="cy" values="118;129" dur="0.28s" begin="0.2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0" dur="0.28s" begin="0.2s" repeatCount="indefinite"/>
          </circle>
        </g>

        <!-- Sand in bottom bulb (dynamic) -->
        <g clip-path="url(#botBulb)">
          <rect id="sandBot" x="0" y="190" width="160" height="40" fill="url(#sandBotGrad)" opacity="0.9"/>
          <ellipse id="sandBotSurface" cx="80" cy="190" rx="28" ry="4" fill="#e8c97a" opacity="0.6"/>
        </g>

        <!-- Frame top bar -->
        <rect x="14" y="10" width="132" height="12" rx="6" fill="url(#frameGrad)"/>
        <!-- Frame bottom bar -->
        <rect x="14" y="218" width="132" height="12" rx="6" fill="url(#frameGrad)"/>
        <!-- Middle connector -->
        <rect x="72" y="116" width="16" height="8" rx="2" fill="url(#frameGrad)"/>

        <!-- Shine on glass -->
        <polygon points="24,22 60,22 50,80 32,80" fill="white" opacity="0.06"/>
        <polygon points="68,126 84,126 100,180 52,180" fill="white" opacity="0.05"/>
      </svg>
    </div>

    <div class="time-display">
      <div id="timeDisplay">00:00:00</div>
      <span id="timeStatus">Set your session time</span>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </div>

    <div class="timer-controls">
      <div class="time-setter">
        <div class="time-input-group">
          <label>Hours</label>
          <input type="number" id="inputH" min="0" max="23" value="2" placeholder="HH">
        </div>
        <div class="time-input-group">
          <label>Mins</label>
          <input type="number" id="inputM" min="0" max="59" value="0" placeholder="MM">
        </div>
        <div class="time-input-group">
          <label>Secs</label>
          <input type="number" id="inputS" min="0" max="59" value="0" placeholder="SS">
        </div>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="startBtn" onclick="startTimer()">▶ Start</button>
        <button class="btn" onclick="pauseTimer()">⏸ Pause</button>
      </div>
      <div class="btn-row">
        <button class="btn" onclick="resetTimer()">↺ Reset</button>
        <button class="btn danger" onclick="stopTimer()">■ Stop</button>
      </div>
    </div>
  </div>

  <!-- ── TODO PANEL ── -->
  <div class="todo-panel">
    <div class="todo-header">
      <h2>Today's Tasks</h2>
      <div class="todo-stats" id="todoStats">0 / 0 complete</div>
    </div>

    <div class="todo-list" id="todoList"></div>

    <div class="add-task-area">
      <label>+ Add a task</label>
      <div class="add-task-row">
        <input class="add-input" type="text" id="newTaskInput" placeholder="Describe your task..." onkeydown="if(event.key==='Enter') addTask()">
        <select class="add-tag-select" id="newTaskTag">
          <option value="High Priority">Writing</option>
          <option value="Medium Priority">Analysis</option>
          <option value="Low Priority">Review</option>
          <option value="Other">Other</option>
        </select>
        <button class="btn primary" onclick="addTask()">Add</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── TASKS ──
const DEFAULT_TASKS = [
  { id: 1, text: "Task 1", tag: "Review", done: false },
  { id: 2, text: "Stuff 2", tag: "Analysis", done: false },
  { id: 3, text: "Faye is Amazing", tag: "Design", done: false },
];

let tasks = JSON.parse(localStorage.getItem('dissTasksV2') || 'null') || DEFAULT_TASKS.map(t => ({...t}));
let nextId = Math.max(...tasks.map(t => t.id), 0) + 1;

function saveTasks() {
  localStorage.setItem('dissTasksV2', JSON.stringify(tasks));
}

function renderTasks() {
  const list = document.getElementById('todoList');
  list.innerHTML = '';
  tasks.forEach(task => {
    const item = document.createElement('div');
    item.className = 'todo-item' + (task.done ? ' done' : '');
    item.dataset.id = task.id;
    item.innerHTML = `
      <div class="todo-check">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5L4.5 8.5L11 1" stroke="#1a1208" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="todo-text">${escHtml(task.text)}</div>
      <span class="todo-tag">${escHtml(task.tag)}</span>
      <button class="todo-delete" onclick="deleteTask(${task.id}, event)" title="Remove">✕</button>
    `;
    item.addEventListener('click', (e) => {
      if (e.target.classList.contains('todo-delete')) return;
      toggleTask(task.id, item);
    });
    list.appendChild(item);
  });
  updateStats();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleTask(id, el) {
  const task = tasks.find(t => t.id === id);
  if (!task) return;
  const wasDone = task.done;
  task.done = !task.done;
  saveTasks();

  if (!wasDone) {
    el.classList.add('completing');
    el.addEventListener('animationend', () => el.classList.remove('completing'), {once:true});
    playApplause();
    launchConfetti();
  }

  setTimeout(() => renderTasks(), wasDone ? 0 : 600);
}

function deleteTask(id, e) {
  e.stopPropagation();
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderTasks();
}

function addTask() {
  const input = document.getElementById('newTaskInput');
  const tag = document.getElementById('newTaskTag').value;
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  tasks.push({ id: nextId++, text, tag, done: false });
  saveTasks();
  input.value = '';
  renderTasks();
  document.getElementById('todoList').lastElementChild?.scrollIntoView({behavior:'smooth'});
}

function updateStats() {
  const done = tasks.filter(t => t.done).length;
  document.getElementById('todoStats').textContent = `${done} / ${tasks.length} complete`;
}

// ── TIMER ──
let totalSeconds = 0, remaining = 0, timerInterval = null, isRunning = false, isPaused = false;

function getInputTime() {
  const h = parseInt(document.getElementById('inputH').value) || 0;
  const m = parseInt(document.getElementById('inputM').value) || 0;
  const s = parseInt(document.getElementById('inputS').value) || 0;
  return h * 3600 + m * 60 + s;
}

function startTimer() {
  if (isRunning && !isPaused) return;
  if (!isRunning) {
    totalSeconds = getInputTime();
    if (totalSeconds <= 0) return;
    remaining = totalSeconds;
  }
  isPaused = false;
  isRunning = true;
  document.getElementById('startBtn').textContent = '▶ Running';
  document.getElementById('timeStatus').textContent = 'Session in progress';
  clearInterval(timerInterval);
  timerInterval = setInterval(tick, 1000);
  updateSandTimer();
}

function pauseTimer() {
  if (!isRunning) return;
  isPaused = true;
  clearInterval(timerInterval);
  document.getElementById('startBtn').textContent = '▶ Resume';
  document.getElementById('timeStatus').textContent = 'Paused';
  document.getElementById('sandStream').style.display = 'none';
}

function resetTimer() {
  clearInterval(timerInterval);
  isRunning = false; isPaused = false;
  remaining = 0; totalSeconds = 0;
  updateDisplay(0);
  updateSandTimer(1, 0);
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressBar').classList.remove('low');
  document.getElementById('startBtn').textContent = '▶ Start';
  document.getElementById('timeStatus').textContent = 'Set your session time';
  document.getElementById('sandStream').style.display = '';
}

function stopTimer() {
  resetTimer();
}

function tick() {
  if (remaining <= 0) {
    clearInterval(timerInterval);
    isRunning = false;
    updateDisplay(0);
    updateSandTimer(0, 1);
    triggerAlarm();
    return;
  }
  remaining--;
  updateDisplay(remaining);
  const pct = totalSeconds > 0 ? remaining / totalSeconds : 0;
  updateSandTimer(pct, 1 - pct);

  const bar = document.getElementById('progressBar');
  bar.style.width = (pct * 100) + '%';
  if (pct < 0.2) bar.classList.add('low');
  else bar.classList.remove('low');

  document.getElementById('timeStatus').textContent = remaining < 60 ? '⚠ Less than a minute!' : 'Session in progress';
}

function updateDisplay(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  document.getElementById('timeDisplay').textContent =
    `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateSandTimer(topFill = 1, botFill = 0) {
  // topFill: 0-1 fraction of top bulb filled
  // The top bulb goes from y=18 to y=118 (height=100)
  // Sand top: rect y goes DOWN as sand depletes
  const topH = 90 * topFill;
  const topY = 118 - topH;
  const sandTop = document.getElementById('sandTop');
  const sandTopSurf = document.getElementById('sandTopSurface');
  sandTop.setAttribute('y', topY);
  sandTop.setAttribute('height', topH + 10);
  sandTopSurf.setAttribute('cy', topY);
  // width of surface at that level (bulb narrows toward bottom)
  const topWidthFrac = 0.3 + 0.7 * topFill;
  sandTopSurf.setAttribute('rx', 35 * topWidthFrac);

  // bottom bulb: y from ~122 to 222 (height=100)
  const botH = 90 * botFill;
  const botY = 222 - botH;
  const sandBot = document.getElementById('sandBot');
  const sandBotSurf = document.getElementById('sandBotSurface');
  sandBot.setAttribute('y', botY);
  sandBot.setAttribute('height', botH + 4);
  sandBotSurf.setAttribute('cy', botY);
  const botWidthFrac = 0.3 + 0.7 * botFill;
  sandBotSurf.setAttribute('rx', 28 * botWidthFrac);

  // hide stream when paused or done
  document.getElementById('sandStream').style.display = (!isRunning || isPaused || topFill <= 0) ? 'none' : '';
}

// ── ALARM ──
function triggerAlarm() {
  document.getElementById('alarmOverlay').classList.add('show');
  playAlarmSound();
  launchConfetti(300);
}

function dismissAlarm() {
  document.getElementById('alarmOverlay').classList.remove('show');
}

// ── SOUND ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playApplause() {
  try {
    const ctx = getAudio();
    // Simulate applause with noise bursts
    for (let i = 0; i < 12; i++) {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let j = 0; j < data.length; j++) {
        data[j] = (Math.random() * 2 - 1) * Math.pow(1 - j/data.length, 0.5) * 0.4;
      }
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.6, ctx.currentTime + i * 0.06);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.06 + 0.15);
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 800 + Math.random() * 400;
      filter.Q.value = 0.8;
      src.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      src.start(ctx.currentTime + i * 0.06);
    }
    // Add a cheerful "ding"
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1320, ctx.currentTime + 0.1);
    g.gain.setValueAtTime(0.3, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}

function playAlarmSound() {
  try {
    const ctx = getAudio();
    for (let i = 0; i < 3; i++) {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = 440;
      g.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.4);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.4 + 0.35);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.4);
      osc.stop(ctx.currentTime + i * 0.4 + 0.35);
    }
  } catch(e) {}
}

// ── CONFETTI ──
const canvas = document.getElementById('confetti-canvas');
const ctx2 = canvas.getContext('2d');
let confettiParticles = [];
let confettiFrame = null;

function launchConfetti(count = 80) {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#e8c97a','#c9934a','#7ec88a','#f0d890','#e07060','#80c4e0','#d4a843'];
  for (let i = 0; i < count; i++) {
    confettiParticles.push({
      x: Math.random() * canvas.width,
      y: -10,
      vx: (Math.random() - 0.5) * 6,
      vy: Math.random() * 4 + 2,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 8,
      w: Math.random() * 10 + 6,
      h: Math.random() * 5 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1
    });
  }
  if (!confettiFrame) animateConfetti();
}

function animateConfetti() {
  ctx2.clearRect(0, 0, canvas.width, canvas.height);
  confettiParticles = confettiParticles.filter(p => p.life > 0.01);
  confettiParticles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.08;
    p.rot += p.rotV;
    p.life -= 0.012;
    ctx2.save();
    ctx2.translate(p.x, p.y);
    ctx2.rotate(p.rot * Math.PI / 180);
    ctx2.globalAlpha = p.life;
    ctx2.fillStyle = p.color;
    ctx2.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx2.restore();
  });
  if (confettiParticles.length > 0) {
    confettiFrame = requestAnimationFrame(animateConfetti);
  } else {
    confettiFrame = null;
    ctx2.clearRect(0, 0, canvas.width, canvas.height);
  }
}

// ── INIT ──
renderTasks();
updateSandTimer(1, 0);

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
